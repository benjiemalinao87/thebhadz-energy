<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Founder access — MACC Systems &amp; Engineering Inc.</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/assets/img/badjj-favicon.png">
<style>
  :root {
    --ink: #14202e; --soft: #45566a; --night: #0d1526; --night2: #16233d;
    --sun: #f5a623; --sun-deep: #e2851a; --line: #2a3a58; --red: #d0432f;
    --sans: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: var(--sans); color: #e6ecf4;
    background: radial-gradient(900px 500px at 70% -10%, #223a5e 0, rgba(0,0,0,0) 60%),
                linear-gradient(160deg, var(--night), var(--night2));
    display: grid; place-items: center; padding: 24px;
  }
  .card {
    width: min(420px, 100%); background: #fffdf8; color: var(--ink);
    border-radius: 18px; padding: 34px 32px 30px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }
  .brand { display: flex; align-items: center; margin-bottom: 4px; }
  .mark { width: min(100%, 340px); height: auto; object-fit: contain; display: block; border-radius: 7px; }
  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sun-deep); margin: 18px 0 6px; }
  h1 { font-size: 24px; margin: 0 0 6px; letter-spacing: -0.01em; }
  .sub { color: var(--soft); font-size: 15px; margin: 0 0 22px; }
  label { display: block; font-size: 15px; font-weight: 600; margin-bottom: 7px; }
  input[type=password] {
    width: 100%; font-family: var(--sans); font-size: 17px; padding: 14px 15px;
    border: 1.5px solid #ded5c2; border-radius: 10px; background: #fff; color: var(--ink);
  }
  input[type=password]:focus { outline: 2px solid var(--sun); outline-offset: 1px; border-color: var(--sun); }
  .btn {
    width: 100%; margin-top: 18px; font-family: var(--sans); font-size: 18px; font-weight: 700;
    padding: 15px; border: 0; border-radius: 999px; cursor: pointer; color: #3a2400;
    background: linear-gradient(180deg, var(--sun), var(--sun-deep));
    box-shadow: 0 8px 20px rgba(226,133,26,0.4);
  }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .msg { color: var(--red); font-size: 14.5px; font-weight: 600; margin-top: 14px; min-height: 20px; }
  .foot { margin-top: 22px; font-size: 13px; color: var(--soft); text-align: center; }
  .foot a { color: var(--sun-deep); text-decoration: none; }
  .lock { font-size: 15px; }
</style>
</head>
<body>
  <main class="card">
    <div class="brand"><img class="mark" src="/assets/img/macc-wordmark.png" alt="MACC Systems and Engineering Inc." width="340" height="48"></div>
    <p class="eyebrow">Founder access</p>
    <h1><span class="lock">🔒</span> Internal documentation</h1>
    <p class="sub">Enter the founder password to open the strategy decks, operating tools, and Solar City engineering files.</p>

    <form id="login-form" novalidate>
      <label for="pw">Founder password</label>
      <input id="pw" name="password" type="password" autocomplete="current-password" placeholder="••••••••" autofocus required>
      <button class="btn" type="submit" id="go">Unlock documentation</button>
      <div class="msg" id="msg" role="alert" aria-live="assertive"></div>
    </form>

    <p class="foot">Founders only. <a href="/">← Back to site</a></p>
  </main>

  <script>
    (function () {
      var form = document.getElementById("login-form");
      var pw = document.getElementById("pw");
      var msg = document.getElementById("msg");
      var btn = document.getElementById("go");

      // where to go after login (?next=/internal/... ), default to the docs overview
      var params = new URLSearchParams(location.search);
      var next = params.get("next") || "/internal/";
      if (next.indexOf("/internal") !== 0) next = "/internal/"; // only allow internal redirects

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        msg.textContent = "";
        if (!pw.value) { msg.textContent = "Please enter the password."; return; }
        btn.disabled = true; btn.textContent = "Checking…";

        fetch("/api/founder-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw.value })
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (res.ok && res.j.ok) {
              window.location.href = next;
            } else {
              msg.textContent = (res.j && res.j.error) || "Incorrect password.";
              btn.disabled = false; btn.textContent = "Unlock documentation";
              pw.select();
            }
          })
          .catch(function () {
            msg.textContent = "Something went wrong. Please try again.";
            btn.disabled = false; btn.textContent = "Unlock documentation";
          });
      });
    })();
  </script>
</body>
</html>
