name = "solar-city-funnel"
pages_build_output_dir = "."
compatibility_date = "2024-11-01"

# D1 database binding for leads storage (accessed as env.DB in Functions)
[[d1_databases]]
binding = "DB"
database_name = "solar-city-leads"
database_id = "ed3892aa-1dce-41ce-9727-2a831a4ec1f1"

# R2 bucket for team-note image attachments (accessed as env.NOTES_R2 in Functions)
[[r2_buckets]]
binding = "NOTES_R2"
bucket_name = "solar-city-notes"
